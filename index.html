<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vila dos Amigos</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #2c3e50; color: white; }
        #mapa {
            width: 90vw; /* Responsivo para celular */
            max-width: 600px;
            height: 400px;
            background-color: #7cfc00;
            position: relative;
            border: 5px solid #8b4513;
            cursor: crosshair;
            margin: 20px auto;
            overflow: hidden;
            border-radius: 10px;
        }
        .casa {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #8b4513;
            border-top: 15px solid #e74c3c;
            text-align: center;
            font-size: 10px;
            color: white;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h1>Vila do Slow 🚀</h1>
    <p>Toque no mapa para construir sua casa!</p>
    
    <div id="mapa"></div>

    <script type="module">
      // Importando os módulos necessários do Firebase
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      // 1. COLE SUAS CONFIGURAÇÕES REAIS AQUI ABAIXO
      const firebaseConfig = {
        apiKey: "AIzaSyB2ZMlYu2mYZfvxYj0qrSnr2aLUIX8ne5s",
        authDomain: "seu-projeto.firebaseapp.com",
        databaseURL: "https://seu-projeto.firebaseio.com",
        projectId: "seu-projeto",
        storageBucket: "seu-projeto.appspot.com",
        messagingSenderId: "12345",
        appId: "1:12345:web:abcde"
      };

      // Inicializa o Firebase
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const casasRef = ref(db, 'casas');

      const mapa = document.getElementById('mapa');

      // 2. FUNÇÃO PARA CONSTRUIR (Atribuída ao mapa via código)
      mapa.onclick = function(event) {
        const nome = prompt("Quem vai morar aqui?");
        if (!nome) return;

        const rect = mapa.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;

        // Salva as coordenadas e o nome no Banco de Dados
        push(casasRef, {
          dono: nome,
          posX: x,
          posY: y
        });
      };

      // 3. ESCUTA O BANCO: Desenha a casa sempre que uma nova for criada
      onChildAdded(casasRef, (data) => {
        const info = data.val();
        const novaCasa = document.createElement('div');
        novaCasa.className = 'casa';
        // Ajuste para a casa aparecer centralizada no clique
        novaCasa.style.left = (info.posX - 15) + 'px';
        novaCasa.style.top = (info.posY - 15) + 'px';
        novaCasa.innerHTML = info.dono;
        mapa.appendChild(novaCasa);
      });
    </script>
</body>
</html>
